events {}

http {
  include /etc/nginx/mime.types;

  server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS so nginx re-resolves backend after container recreation
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:3000;

    root /usr/share/nginx/html;
    index index.html;

    # REST API
    location /api/ {
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ensure module scripts always have correct MIME type.
    # Without this, some browser caches can keep an old "text/plain" response and React won't start.
    location ~* \.(js|mjs)$ {
      default_type application/javascript;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      try_files $uri =404;
    }

    # Socket.io (websocket upgrade)
    location /socket.io/ {
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}

