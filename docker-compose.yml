version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: majestic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-majestic_family}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: majestic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      - postgres
      - redis
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/majestic_family}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # CORS + redirects
      HOST_URL: ${HOST_URL:-http://localhost}
      PUBLIC_HOST_URL: ${PUBLIC_HOST_URL:-http://localhost}
      ADMIN_HOST_URL: ${ADMIN_HOST_URL:-http://localhost}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.localhost}

      # OAuth session
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      BOT_OWNER_ID: ${BOT_OWNER_ID}

      # IPC: backend -> bot
      IPC_BOT_BASE_URL: ${IPC_BOT_BASE_URL:-http://bot:3001}
    ports:
      - "3000:3000"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/majestic_family}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      BOT_OWNER_ID: ${BOT_OWNER_ID}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.localhost}

      # Diagnostic: disable background interval jobs to test interaction stability.
      # Set BOT_DISABLE_BG_JOBS=1 (in .env) and restart containers.
      BOT_DISABLE_BG_JOBS: ${BOT_DISABLE_BG_JOBS:-0}

      # Bot -> backend REST/WS triggers
      IPC_BACKEND_BASE_URL: ${IPC_BACKEND_BASE_URL:-http://backend:3000}

      # Backend -> bot IPC server
      IPC_BOT_BASE_URL: ${IPC_BOT_BASE_URL:-http://bot:3001}
      IPC_BOT_LISTEN_HOST: ${IPC_BOT_LISTEN_HOST:-0.0.0.0}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
